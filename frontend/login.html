<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · AI 产品方案评审系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary:       #FF7D00;
  --primary-hover: #F77234;
  --border:        #E5E6EB;
  --border-light:  #F2F3F5;
  --text-1:        #1D2129;
  --text-2:        #4E5969;
  --text-3:        #86909C;
  --text-4:        #C9CDD4;
  --radius:        4px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; }

/* ── 动态背景 ── */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: linear-gradient(120deg, #15161A 0%, #3A1A08 30%, #1A1015 60%, #2A1505 100%);
  background-size: 300% 300%;
  animation: bgShift 8s ease-in-out infinite;
}
@keyframes bgShift {
  0%   { background-position: 0% 50%; }
  25%  { background-position: 60% 20%; }
  50%  { background-position: 100% 50%; }
  75%  { background-position: 40% 80%; }
  100% { background-position: 0% 50%; }
}
.login-blob { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; mix-blend-mode: screen; will-change: transform; }
.b1 { width: 560px; height: 560px; background: rgba(255,125,0,.75); top: -140px; right: -100px; animation: blob1 9s ease-in-out infinite; }
.b2 { width: 460px; height: 460px; background: rgba(247,114,52,.65); bottom: -120px; left: -80px; animation: blob2 11s ease-in-out infinite; }
.b3 { width: 380px; height: 380px; background: rgba(255,180,0,.55); top: 40%; left: 25%; animation: blob3 7s ease-in-out infinite; }
.b4 { width: 340px; height: 340px; background: rgba(114,46,209,.5); bottom: 15%; right: 20%; animation: blob4 10s ease-in-out infinite; }
.b5 { width: 260px; height: 260px; background: rgba(255,80,80,.45); top: 15%; left: 45%; animation: blob5 8s ease-in-out infinite; }
@keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-180px,140px) scale(1.3)} 66%{transform:translate(-80px,220px) scale(.85)} }
@keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(200px,-160px) scale(1.25)} 66%{transform:translate(120px,-80px) scale(.9)} }
@keyframes blob3 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(160px,-120px) scale(1.4)} 50%{transform:translate(-100px,80px) scale(.8)} 75%{transform:translate(80px,160px) scale(1.1)} }
@keyframes blob4 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-140px,-180px) scale(1.35)} }
@keyframes blob5 { 0%,100%{transform:translate(0,0) scale(.9)} 50%{transform:translate(120px,200px) scale(1.4)} }
.login-particles {
  position: absolute; inset: 0; pointer-events: none; opacity: .4;
  background-image: radial-gradient(rgba(255,255,255,.55) 1px, transparent 1.2px);
  background-size: 28px 28px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  animation: particleDrift 18s linear infinite;
}
@keyframes particleDrift { from { background-position: 0 0; } to { background-position: 280px -280px; } }

/* ── 卡片 ── */
.login-card {
  background: #fff; border-radius: 8px; padding: 40px 44px; width: 400px;
  box-shadow: 0 12px 48px rgba(0,0,0,.36); position: relative; z-index: 1;
}

/* ── 品牌区 ── */
.login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border-light); }
.brand-icon-wrap { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
.brand-icon-wrap::before {
  content: ''; position: absolute; inset: -6px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,125,0,.22) 0%, rgba(255,125,0,0) 70%);
  animation: brandPulse 2.6s ease-in-out infinite;
}
@keyframes brandPulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
.brand-icon-wrap svg { width: 48px; height: 48px; display: block; position: relative; z-index: 1; }
.lb-brain { stroke: #D25F00; stroke-width: 1.4; fill: none; stroke-linejoin: round; stroke-linecap: round; }
.lb-fold  { stroke: rgba(210,95,0,.5); stroke-width: .8; fill: none; stroke-linecap: round; }
.lb-node  { fill: #FF7D00; }
.lb-check { stroke: #FF7D00; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 1.5px rgba(255,125,0,.5)); }
.brand-text h1 { font-size: 16px; font-weight: 700; color: var(--text-1); line-height: 1.3; }
.brand-text p  { font-size: 11px; color: var(--text-3); margin-top: 3px; }

/* ── 表单 ── */
.tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab-item { flex: 1; text-align: center; padding: 8px 0; font-size: 14px; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
.tab-item.active { color: var(--primary); font-weight: 600; border-bottom-color: var(--primary); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 9px 12px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; outline: none; transition: all .15s; color: var(--text-1); }
.form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(255,125,0,.15); }
.form-input.error { border-color: #F53F3F; }
.err-msg { font-size: 12px; color: #F53F3F; margin-top: 4px; min-height: 16px; }
.submit-btn {
  width: 100%; padding: 10px; background: var(--primary); color: #fff;
  border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
  cursor: pointer; margin-top: 8px; transition: background .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.submit-btn:hover:not(:disabled) { background: var(--primary-hover); }
.submit-btn:disabled { opacity: .6; cursor: not-allowed; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.submit-btn.loading .spinner { display: block; }
.submit-btn.loading .btn-text { opacity: .7; }
.login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-4); }

@media (max-width: 480px) {
  .login-card { width: calc(100% - 32px); padding: 28px 20px; }
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-blob b1"></div>
  <div class="login-blob b2"></div>
  <div class="login-blob b3"></div>
  <div class="login-blob b4"></div>
  <div class="login-blob b5"></div>
  <div class="login-particles"></div>

  <div class="login-card">
    <!-- 品牌 -->
    <div class="login-brand">
      <div class="brand-icon-wrap">
        <svg viewBox="0 0 32 32">
          <path class="lb-brain" d="M15.5 5.5c-2-1.6-5-1.2-6.4.8-1.4-.2-2.8.6-3.3 2-.7.4-1.2 1.2-1.2 2.2 0 .9.4 1.7 1.1 2.2-.3 1.4.4 2.8 1.7 3.4-.1 1.5 1 2.9 2.5 3.1.4 1.4 1.7 2.4 3.2 2.4 1.1 0 2.1-.5 2.7-1.4V5.5Z"/>
          <path class="lb-brain" d="M16.5 5.5c2-1.6 5-1.2 6.4.8 1.4-.2 2.8.6 3.3 2 .7.4 1.2 1.2 1.2 2.2 0 .9-.4 1.7-1.1 2.2.3 1.4-.4 2.8-1.7 3.4.1 1.5-1 2.9-2.5 3.1-.4 1.4-1.7 2.4-3.2 2.4-1.1 0-2.1-.5-2.7-1.4V5.5Z"/>
          <path class="lb-fold" d="M16 5.5v15M12 9c1 .8 2 1 3 .6M20 9c-1 .8-2 1-3 .6M11 14c1.4.8 3 1 4.2.4M21 14c-1.4.8-3 1-4.2.4"/>
          <circle class="lb-node" cx="10" cy="10" r="1"/><circle class="lb-node" cx="22" cy="10" r="1"/>
          <circle class="lb-node" cx="9" cy="15" r="1"/><circle class="lb-node" cx="23" cy="15" r="1"/>
          <circle class="lb-node" cx="13" cy="19" r="1"/><circle class="lb-node" cx="19" cy="19" r="1"/>
          <path class="lb-check" d="m11.5 15 3 3 6-6"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>AI 产品方案评审系统</h1>
        <p>多角色 Agent · 业务知识库 · 智能评审</p>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('login')">登 录</div>
      <div class="tab-item" onclick="switchTab('register')">注 册</div>
    </div>

    <!-- 登录表单 -->
    <div id="panel-login" class="tab-panel active">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input id="login-username" class="form-input" type="text" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input id="login-password" class="form-input" type="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <div id="login-err" class="err-msg"></div>
      <button class="submit-btn" id="login-btn" onclick="doLogin()">
        <div class="spinner" id="login-spinner"></div>
        <span class="btn-text">登 录</span>
      </button>
    </div>

    <!-- 注册表单 -->
    <div id="panel-register" class="tab-panel">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input id="reg-username" class="form-input" type="text" placeholder="2-32 个字符">
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input id="reg-email" class="form-input" type="email" placeholder="example@company.com">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input id="reg-password" class="form-input" type="password" placeholder="至少 8 位">
      </div>
      <div id="reg-err" class="err-msg"></div>
      <button class="submit-btn" id="reg-btn" onclick="doRegister()">
        <div class="spinner" id="reg-spinner"></div>
        <span class="btn-text">注 册</span>
      </button>
    </div>

    <div class="login-footer">© 2025 AI Review System · 产品团队内部使用</div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
// 已登录则直接跳主应用
if (getToken()) window.location.replace('app.html');

function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach((el, i) =>
    el.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  clearErrors();
}

function clearErrors() {
  document.getElementById('login-err').textContent = '';
  document.getElementById('reg-err').textContent = '';
  document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
}

function setLoading(btnId, spinnerId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
  document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-err');

  if (!username) {
    document.getElementById('login-username').classList.add('error');
    errEl.textContent = '请输入用户名'; return;
  }
  if (!password) {
    document.getElementById('login-password').classList.add('error');
    errEl.textContent = '请输入密码'; return;
  }

  setLoading('login-btn', 'login-spinner', true);
  errEl.textContent = '';

  try {
    const data = await login(username, password);

    // 拉取用户信息（临时从 token payload 解析，后续可加 /api/v1/users/me 接口）
    const payload = JSON.parse(atob(data.accessToken.split('.')[1]));
    const user = { id: payload.userId, username: payload.username, role: payload.role };

    saveAuth(data.accessToken, user);
    window.location.href = 'app.html';
  } catch (e) {
    errEl.textContent = e.message || '登录失败，请稍后重试';
    document.getElementById('login-username').classList.add('error');
    document.getElementById('login-password').classList.add('error');
  } finally {
    setLoading('login-btn', 'login-spinner', false);
  }
}

async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl    = document.getElementById('reg-err');

  if (!username || username.length < 2) {
    document.getElementById('reg-username').classList.add('error');
    errEl.textContent = '用户名至少 2 个字符'; return;
  }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('reg-email').classList.add('error');
    errEl.textContent = '请输入有效邮箱'; return;
  }
  if (!password || password.length < 8) {
    document.getElementById('reg-password').classList.add('error');
    errEl.textContent = '密码至少 8 位'; return;
  }

  setLoading('reg-btn', 'reg-spinner', true);
  errEl.textContent = '';

  try {
    await register(username, email, password);
    // 注册成功后自动登录
    const data = await login(username, password);
    const payload = JSON.parse(atob(data.accessToken.split('.')[1]));
    saveAuth(data.accessToken, { id: payload.userId, username: payload.username, role: payload.role });
    window.location.href = 'app.html';
  } catch (e) {
    errEl.textContent = e.message || '注册失败，请稍后重试';
  } finally {
    setLoading('reg-btn', 'reg-spinner', false);
  }
}

// Enter 键提交
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('active')) doLogin();
  else doRegister();
});
</script>
</body>
</html>
