spring:
  application:
    name: prd-review-app
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    try-it-out-enabled: true

ai:
  fetch:
    timeout-connect-ms: 5000
    timeout-read-ms: 15000
    user-agent: PrdReview-Bot/1.0

kb:
  git:
    poll-interval-ms: 3600000
    poll-initial-delay-ms: 60000
    clone-base-dir: ./kb-data
    clone-timeout-ms: 300000
    fetch-timeout-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
