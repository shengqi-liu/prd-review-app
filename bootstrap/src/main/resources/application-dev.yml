jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars!!}
  expiration: 86400  # 24h (seconds)

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/prd_review?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:Lsq1990!}
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    vectorstore:
      chroma:
        client:
          host: localhost
          port: 8000

logging:
  level:
    root: INFO
    com.prdreview: DEBUG
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%thread]){faint} %clr(%logger{36}){cyan} - %msg [traceId=%X{traceId}]%n"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
